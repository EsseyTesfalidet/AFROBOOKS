<!DOCTYPE html>
<html>
<head>
  <title>CampusConnect — Offline</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #F8FAFC; }
    h1 { color: #2563EB; font-size: 24px; }
    p { color: #64748B; font-size: 14px; text-align: center; padding: 0 32px; }
    button { margin-top: 20px; padding: 12px 24px; background: #2563EB; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <h1>CampusConnect</h1>
  <p>You are offline. Please check your internet connection and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
